# Tunable Vibe harness profile for Mistral Medium 3.5 (local, DGX Spark).
# The [[providers]] / [[models]] / active_model block is INFRASTRUCTURE — do not
# change it. The proposer tunes everything else (system prompt, enabled_skills,
# default_agent, tool settings) to improve agentic-coding scores.

active_model = "mistral-local"

# --- tunable (must stay ABOVE the [[providers]]/[[models]] table headers: in
# TOML, keys written after a table header belong to that table, not top level;
# VibeConfigSchema only reads these as TOP-LEVEL keys and silently ignores
# unknown/misplaced ones) ---
# Disable write_file: the model batches multiple write_file calls in one
# message, which serialize as dead plain text (06_multifile 0/3). With
# write_file gone, file creation goes through ONE bash call (mkdir -p +
# quoted heredocs), the recipe the tool-call-protocol skill teaches.
disabled_tools = ["write_file"]
# Raise the HTTP read timeout above the 15-min trial wall clock. The default
# 720s aborts a slow long generation (the ~2 tok/s local model writing a big
# script heredoc) and blindly RE-GENERATES it from scratch: 18_txn_wal trial2
# stalled at exactly start+720s (ReadTimeout in vibe.log at 05:40:25 =
# 05:28:25 + 720.0s), lost the nearly-finished script, and the retry kept the
# GPU busy into the next trial's slot. Inert for any turn under 12 min.
api_timeout = 3600.0

[[providers]]
name = "spark-mistral"
api_base = "http://192.168.86.29:8010/v1"
api_key_env_var = "VIBE_LOCAL_KEY"
api_style = "openai"
backend = "generic"

[[models]]
name = "Mistral-Medium-3.5"
provider = "spark-mistral"
alias = "mistral-local"

# NOTE: the two keys below sit inside the [[models]] table (they follow its
# header) and ModelConfig ignores unknown keys — they are INERT and always
# have been. Kept only as documentation of intent; the skill is active anyway
# because ~/.vibe/skills/ is auto-discovered. Do not add tunables here — put
# them at the TOP of this file, above [[providers]].
system_prompt = """You are an expert coding agent. ALWAYS use real structured tool calls to execute actions. Never output a tool call as plain text: text is not executed, no file is written, and the task fails. Make exactly ONE tool call per message. Create files with the bash tool (mkdir -p plus quoted heredocs when several files are needed); modify existing files with the edit tool. Follow the tool-call-protocol skill."""
enabled_skills = ["tool-call-protocol", "verify-before-done", "plan-before-code", "malformed-vs-rejected"]
